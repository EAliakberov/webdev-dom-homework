<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
    
  </body>

  <script>
    "use strict";
    
    const commentsEl = document.querySelector("ul.comments");
    const addBtnEl = document.querySelector("button.add-form-button");
    const nameEl = document.querySelector('.add-form-name');
    const textEl = document.querySelector('.add-form-text');

    const comments = [
      {name: 'Глеб Фокин', text: 'Это будет первый комментарий на этой странице', date: '12.02.22 12:18', likesCount: 3, liked: false},
      {name: 'Варвара Н.', text: 'Мне нравится как оформлена эта страница! ❤', date: '13.02.22 19:22', likesCount: 75, liked: true}
     ];


    const initListeners = () => {
      
      const commentEls = commentsEl.querySelectorAll('.comment');

      for(let commentEl of commentEls){
        const likeBtn = commentEl.querySelector('.like-button');
        let index = +likeBtn.dataset.index;

        //Клик по самому комменту
        commentEl.addEventListener('click',()=>{
          textEl.value = `>${comments[index].name}\n"${comments[index].text}"\n`.replaceAll("&gt;",">").replaceAll("&lt;","<");
        })

        //Клик по лайку внутри коммента и вызов перерисоки только лайков
        likeBtn.addEventListener('click',(event)=>{
          event.stopPropagation();
          if(comments[index].liked){
            comments[index].liked = false;
            comments[index].likesCount--;
            
          }
          else{
            comments[index].liked = true;
            comments[index].likesCount++;            
          }
           renderLike(commentEl, index);         
        })
      }          
    }

    //Рендер только лайка и счетчика для экономии ресурсов
    const renderLike = (commentEl, index) => {
      const likeBtn = commentEl.querySelector('.like-button');
      const likeCntr = commentEl.querySelector('.likes-counter');

      comments[index].liked?likeBtn.classList.add('-active-like'):likeBtn.classList.remove('-active-like');
      likeCntr.textContent = comments[index].likesCount;
    }

    //Рендер всех комментариев сразу
    const renderComments = () =>{
      commentsEl.innerHTML = comments.map((comment,index)=>{
        return `<li class="comment" data-index="${index}">
        <div class="comment-header">
          <div>${comment.name}</div>
          <div>${comment.date}</div>
        </div>
        <div class="comment-body">
          <div class="comment-text">
            ${comment.text}
          </div>
        </div>
        <div class="comment-footer">
          <div class="likes">
            <span class="likes-counter">${comment.likesCount}</span>
            <button class="like-button ${comment.liked?'-active-like':''}" data-index="${index}"></button>
          </div>
        </div>
      </li>`;
      }).join('');

      initListeners();
    } 

    renderComments();

    addBtnEl.addEventListener('click',()=>{ 
      if (nameEl.value.trim() === '' || textEl.value.trim() === ''){
          return;
      }

      const date = new Date();

      const dateOptions = {year: '2-digit', month:'2-digit', day: '2-digit'};
      const dateStr = date.toLocaleDateString('ru-RU', dateOptions);

      const timeOptions = {hour: '2-digit', minute:'2-digit'};
      const timeStr = date.toLocaleTimeString('ru-RU', timeOptions);


      comments.push({name: nameEl.value.replaceAll("<","&lt;").replaceAll(">","&gt;").trim(), text: textEl.value.replaceAll("<","&lt;").replaceAll(">","&gt;").trim(), date: `${dateStr} ${timeStr}`, likesCount: 0, liked: false});
      renderComments();
    })

    console.log("It works!");
  </script>
</html>
