<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
    
  </body>

  <script>
    "use strict";
    
    const commentsEl = document.querySelector("ul.comments");
    const addBtnEl = document.querySelector("button.add-form-button");
    const comments = [
      {name: 'Глеб Фокин', text: 'Это будет первый комментарий на этой странице', date: '12.02.22 12:18', likesCount: 3, liked: false},
      {name: 'Варвара Н.', text: 'Мне нравится как оформлена эта страница! ❤', date: '13.02.22 19:22', likesCount: 75, liked: true}
     ];


    const initLikeListeners = () => {
      const likeBtns = commentsEl.querySelectorAll('.like-button');
      for(let btn of likeBtns){
        let index = +btn.dataset.index;
        btn.addEventListener('click',()=>{
          if(comments[index].liked){
            comments[index].liked = false;
            comments[index].likesCount--;
          }
          else{
            comments[index].liked = true;
            comments[index].likesCount++;
          }
          renderComments();
        })
      }
    }


    const renderComments = () =>{
      commentsEl.innerHTML = comments.map((comment,index)=>{
        return `<li class="comment">
        <div class="comment-header">
          <div>${comment.name}</div>
          <div>${comment.date}</div>
        </div>
        <div class="comment-body">
          <div class="comment-text">
            ${comment.text}
          </div>
        </div>
        <div class="comment-footer">
          <div class="likes">
            <span class="likes-counter">${comment.likesCount}</span>
            <button class="like-button ${comment.liked?'-active-like':''}" data-index="${index}" "></button>
          </div>
        </div>
      </li>`;
      }).join('');

      initLikeListeners();
    } 

    renderComments();





    addBtnEl.addEventListener('click',()=>{
      const oldHTML = commentsEl.innerHTML;
      const nameEl = document.querySelector('.add-form-name');
      const textEl = document.querySelector('.add-form-text');

      if (nameEl.value === '' || textEl.value === ''){
          return;
      }

      const date = new Date();

      const dateOptions = {year: '2-digit', month:'2-digit', day: '2-digit'};
      const dateStr = date.toLocaleDateString('ru-RU', dateOptions);

      const timeOptions = {hour: '2-digit', minute:'2-digit'};
      const timeStr = date.toLocaleTimeString('ru-RU', timeOptions);


      comments.push({name: nameEl.value, text: textEl.value, date: `${dateStr} ${timeStr}`, likesCount: 0, liked: false});
      renderComments();
    })

    console.log("It works!");
  </script>
</html>
